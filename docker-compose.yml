services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: quant_timescaledb
    restart: always
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant1234
      POSTGRES_DB: quant_db
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: quant_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana-oss:latest
    container_name: quant_grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: quant1234
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: quant_uptime_kuma
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -o /dev/null -w '%{http_code}' http://localhost:3001 | grep -qE '^(200|301|302)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: quant_prefect_server
    restart: always
    ports:
      - "4200:4200"
    environment:
      PREFECT_UI_URL: http://localhost:4200
      PREFECT_API_URL: http://0.0.0.0:4200/api
      PREFECT_SERVER_API_HOST: 0.0.0.0
    volumes:
      - prefect_data:/root/.prefect
    command: prefect server start
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  prefect-worker:
    image: prefecthq/prefect:3-latest
    container_name: quant_prefect_worker
    restart: always
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
    volumes:
      - ./flows:/opt/prefect/flows
    depends_on:
      prefect-server:
        condition: service_healthy
    command: prefect worker start --pool default-agent-pool --type process

volumes:
  timescale_data:
  redis_data:
  grafana_data:
  uptime_kuma_data:
  prefect_data:
